:root{

body{

color:var(--text);

}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:
  radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,255,136,0.06) 0%, transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
pointer-events:none;
z-index:0;
}

/* MENU */
.menu{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(6,13,26,0.9);
backdrop-filter:blur(20px);
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid rgba(0,255,136,0.1);
}

.logo{
font-family:'Rajdhani',sans-serif;
font-weight:700;
font-size:20px;
letter-spacing:2px;
color:var(--accent);
}

.menu a{
font-family:'Rajdhani',sans-serif;
font-weight:600;
font-size:14px;
letter-spacing:2px;
color:var(--muted);
text-decoration:none;
padding:8px 16px;
border:1px solid rgba(100,116,139,0.3);
border-radius:6px;
transition:0.3s;
}

.menu a:hover{
color:var(--accent);
border-color:var(--accent);
}

/* HEADER */
.header{
position:relative;
z-index:1;
text-align:center;
padding:80px 20px 50px;
}

.header h1{
font-family:'Rajdhani',sans-serif;
font-size:clamp(32px,6vw,64px);
font-weight:700;
letter-spacing:4px;
line-height:1.1;
margin-bottom:12px;
}

.header h1 span{
color:var(--accent);
}

.subtitle{
font-size:16px;
color:var(--muted);
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:40px;
}

/* PAYMENT BOX */
.payment{
display:inline-flex;
flex-direction:column;
align-items:center;
gap:12px;
background:rgba(13,31,53,0.8);
border:1px solid rgba(0,255,136,0.2);
border-radius:16px;
padding:24px 40px;
margin-bottom:40px;
}

.price{
font-family:'Rajdhani',sans-serif;
font-size:36px;
font-weight:700;
color:var(--accent);
letter-spacing:2px;
}

.iban{
font-size:13px;
color:var(--muted);
letter-spacing:1px;
}

.iban span{
color:var(--text);
font-weight:500;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:10px 22px;
border:none;
border-radius:8px;
font-size:13px;
font-weight:500;
cursor:pointer;
letter-spacing:1px;
transition:0.3s;
text-decoration:none;
display:inline-block;
}

.btn:hover{transform:translateY(-2px);}

.whatsapp{background:#25D366;color:white;}
.email-btn{background:var(--accent2);color:white;}

/* SECTION TITLE */
.section-title{
font-family:'Rajdhani',sans-serif;
font-size:13px;
letter-spacing:4px;
color:var(--muted);
text-transform:uppercase;
text-align:center;
margin-bottom:30px;
}

/* CARDS */
.cards{
position:relative;
z-index:1;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:16px;
padding:0 20px 80px;
max-width:1000px;
margin:0 auto;
}

.card{
background:var(--surface);
border:1px solid rgba(255,255,255,0.06);
color:var(--text);
padding:32px 24px;
width:200px;
border-radius:14px;
font-family:'Rajdhani',sans-serif;
font-size:17px;
font-weight:600;
letter-spacing:1px;
cursor:pointer;
transition:0.35s;
text-align:center;
text-decoration:none;
display:block;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(135deg,rgba(0,255,136,0.08),transparent);
opacity:0;
transition:0.35s;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(0,255,136,0.4);
color:var(--accent);
box-shadow:0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(0,255,136,0.1);
}

.card:hover::before{opacity:1;}

.card-icon{
font-size:28px;
margin-bottom:10px;
display:block;
}

@media(max-width:768px){
.menu{padding:16px 20px;}
.header{padding:60px 20px 40px;}
.card{width:calc(50% - 8px);}
.payment{padding:20px 24px;}
}
</style>
